services:
  web:
    build:
      context: .
      dockerfile: docker/dockerfile
    command: uvicorn sellpy_agent.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/core
    working_dir: /core
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: sellpydb
      POSTGRES_USER: gabriel
      POSTGRES_PASSWORD: gabriel123

volumes:
  postgres_data: